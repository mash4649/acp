name: ACP Conformance

on:
  push:
    branches:
      - main
      - master
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      mode:
        description: "Conformance mode"
        required: true
        default: "reference"
        type: choice
        options:
          - mock
          - reference
          - external
          - required-external
      profile:
        description: "Conformance profile path"
        required: false
        default: "conformance/profiles/phase1.profile.json"
        type: choice
        options:
          - conformance/profiles/phase1.profile.json
          - conformance/profiles/phase2.profile.json
          - conformance/profiles/phase3.profile.json

jobs:
  conformance_lock_guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify requirements lock
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          def parse_pins(path: Path) -> dict[str, str]:
              pins: dict[str, str] = {}
              for lineno, raw in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  match = re.fullmatch(r"([A-Za-z0-9_.-]+)==([A-Za-z0-9_.!+\-]+)", line)
                  if match is None:
                      raise SystemExit(f"{path}:{lineno}: unsupported requirement format: {line}")
                  pins[match.group(1).lower()] = match.group(2)
              return pins

          direct = parse_pins(Path("requirements-conformance.txt"))
          locked = parse_pins(Path("requirements-conformance.lock"))
          missing = sorted(name for name in direct if name not in locked)
          drift = sorted(
              f"{name} ({direct[name]} != {locked[name]})"
              for name in direct
              if name in locked and direct[name] != locked[name]
          )
          if missing or drift:
              if missing:
                  print("Lock missing direct requirements: " + ", ".join(missing), file=sys.stderr)
              if drift:
                  print("Lock version drift: " + ", ".join(drift), file=sys.stderr)
              raise SystemExit(1)
          print("requirements lock: ok")
          PY

  cross_version_compat:
    needs: conformance_lock_guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install conformance dependencies from lock
        run: python -m pip install -r requirements-conformance.lock

      - name: Run cross-version report compatibility suite
        run: ./scripts/cross_version_compat.sh

  reference_conformance:
    needs:
      - conformance_lock_guard
      - cross_version_compat
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - conformance/profiles/phase1.profile.json
          - conformance/profiles/phase2.profile.json
          - conformance/profiles/phase3.profile.json
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Public release guardrail check
        run: ./scripts/public_release_check.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install conformance dependencies from lock
        run: python -m pip install -r requirements-conformance.lock

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit on lock
        run: pip-audit -r requirements-conformance.lock --no-deps --disable-pip

      - name: Run reference conformance gate
        env:
          ACP_CONFORMANCE_MODE: reference
          ACP_CONFORMANCE_PROFILE: ${{ matrix.profile }}
        run: ./scripts/conformance_ci.sh

  flake_detection:
    needs:
      - conformance_lock_guard
      - cross_version_compat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Public release guardrail check
        run: ./scripts/public_release_check.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install conformance dependencies from lock
        run: python -m pip install -r requirements-conformance.lock

      - name: Re-run reference conformance and compare normalized reports
        env:
          ACP_CONFORMANCE_MODE: reference
          ACP_CONFORMANCE_PROFILE: conformance/profiles/phase1.profile.json
        run: |
          tmpdir="$(mktemp -d)"
          ./scripts/conformance_ci.sh
          jq -S 'del(.run_id, .generated_at)' conformance/out/report.phase1.json > "$tmpdir/report-1.json"
          rm -f conformance/out/report.phase1.json
          ./scripts/conformance_ci.sh
          jq -S 'del(.run_id, .generated_at)' conformance/out/report.phase1.json > "$tmpdir/report-2.json"
          diff -u "$tmpdir/report-1.json" "$tmpdir/report-2.json"
          echo "flake detection: ok"

  contract_smoke:
    needs:
      - conformance_lock_guard
      - cross_version_compat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Public release guardrail check
        run: ./scripts/public_release_check.sh

      - name: Run required-external gate with contract mock runner
        env:
          ACP_CONFORMANCE_MODE: external
          ACP_HARNESS_RUNNER: ./scripts/mock_external_runner.sh
        run: ./scripts/conformance_ci.sh

  external_release_gate:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'required-external')
    needs:
      - conformance_lock_guard
      - cross_version_compat
    runs-on: ubuntu-latest
    env:
      ACP_CONFORMANCE_MODE: required-external
      ACP_CONFORMANCE_PROFILE: ${{ github.event.inputs.profile || 'conformance/profiles/phase1.profile.json' }}
      ACP_HARNESS_RUNNER: ${{ vars.ACP_HARNESS_RUNNER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Public release guardrail check
        run: ./scripts/public_release_check.sh

      - name: Fail if external runner path is not configured
        run: |
          if [ -z "${ACP_HARNESS_RUNNER}" ]; then
            echo "ACP_HARNESS_RUNNER GitHub variable is required for external release gate." >&2
            exit 1
          fi

      - name: Run required external conformance gate
        run: ./scripts/conformance_ci.sh
